specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Inflection AI
providerId: inflection
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- AI
- LLM
- Personal AI
- Pi
- Foundation Models
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of Inflection AI spend. Two billable surfaces - Developer API
  (usage-based per-token rates per Inflection 3.0 model, contract-priced)
  and Inflection for Enterprise (cloud or on-premise purpose-built server,
  contract-priced). Pi consumer is free and out of scope. Public per-token
  rate cards are not published.
notes: >-
  On-premise servers are typically a CapEx purchase (or amortized lease)
  plus an ongoing software/support fee, in contrast to the per-token cloud
  meter. FinOps reporting should split these into separate FOCUS line items.
sources:
- https://inflection.ai/
- https://developers.inflection.ai/
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Inflection AI
serviceCategory: AI and Machine Learning
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Inflection AI
  ServiceCategory: AI and Machine Learning
  ProviderName: Inflection AI
  PublisherName: Inflection AI
  InvoiceIssuerName: Inflection AI
  BillingCurrency: USD
  ChargeCategory: Usage
  PricingCategory: Usage-Based
meters:
- name: input_tokens
  description: Tokens sent in chat requests against Inflection 3.0 models.
  unit: tokens
  aggregation: sum
  dimensions:
  - account
  - model
- name: output_tokens
  description: Tokens generated by Inflection 3.0 models.
  unit: tokens
  aggregation: sum
  dimensions:
  - account
  - model
- name: enterprise_subscription
  description: Annual / multi-year enterprise contract for cloud Inflection 3.0 access.
  unit: contract
  aggregation: sum
  dimensions:
  - organization
- name: on_prem_server
  description: Purpose-built on-premise server purchase / lease and support fees.
  unit: server_units
  aggregation: sum
  dimensions:
  - organization
  - location
principles:
- name: Visibility
  description: Pull token usage from the developer console; reconcile against contract invoices.
- name: Allocation
  description: Tag API keys per workload/team and on-prem servers per business unit.
- name: Optimization
  description: Pick model variant by use case (Pi vs. Productivity); on-prem can lower TCO above sustained volume thresholds.
- name: Accountability
  description: Assign a contract owner; review monthly token burn vs. committed contract.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
